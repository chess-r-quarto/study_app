    interface Sentence {
      id: number;
      type: string;
      english: string;
      japanese: string;
      words: string[];
    }

    interface WordItem {
      id: string;
      text: string;
    }

    const shuffleArray = (array: any[]) => {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    };

    const allSentences: Sentence[] = rawSentences.map((row, index) => ({
      id: index,
      type: row[0],
      english: row[1],
      japanese: row[2],
      words: row[1].split(' ')
    }));

    const App: React.FC = () => {
      const [filterType, setFilterType] = useState<string>('All');
      const [currentIndex, setCurrentIndex] = useState<number>(0);
      const [availableWords, setAvailableWords] = useState<WordItem[]>([]);
      const [selectedWords, setSelectedWords] = useState<WordItem[]>([]);
      const [status, setStatus] = useState<'playing' | 'correct' | 'incorrect'>('playing');
      const [streak, setStreak] = useState<number>(0);

      const filteredSentences = useMemo(() => {
        if (filterType === 'All') return allSentences;
        return allSentences.filter(s => s.type === filterType);
      }, [filterType]);

      const currentSentence = filteredSentences[currentIndex];

      const loadSentence = (index: number) => {
        const sentence = filteredSentences[index];
        if (!sentence) return;

        const wordItems: WordItem[] = sentence.words.map((word, i) => ({
          id: `word-${i}`,
          text: word.toLowerCase()
        }));

        setAvailableWords(shuffleArray(wordItems));
        setSelectedWords([]);
        setStatus('playing');
        setCurrentIndex(index);
      };

      useEffect(() => {
        setCurrentIndex(0);
        loadSentence(0);
        setStreak(0);
      }, [filterType]);

      const handleSelectWord = (word: WordItem) => {
        if (status !== 'playing') return;
        setAvailableWords(prev => prev.filter(w => w.id !== word.id));
        setSelectedWords(prev => [...prev, word]);
      };

      const handleDeselectWord = (word: WordItem) => {
        if (status !== 'playing') return;
        setSelectedWords(prev => prev.filter(w => w.id !== word.id));
        setAvailableWords(prev => [...prev, word]);
      };

      const checkAnswer = () => {
        if (selectedWords.length !== currentSentence.words.length) return;

        const userAnswer = selectedWords.map(w => w.text).join(' ');
        const correctAnswer = currentSentence.english.toLowerCase();

        if (userAnswer === correctAnswer) {
          setStatus('correct');
          setStreak(prev => prev + 1);
        } else {
          setStatus('incorrect');
          setStreak(0);
        }
      };

      const handleNext = () => {
        const nextIndex = Math.floor(Math.random() * filteredSentences.length);
        loadSentence(nextIndex);
      };

      const handleReset = () => {
        loadSentence(currentIndex);
      };

      if (!currentSentence) return <div className="text-center mt-10">Loading...</div>;

      const capitalizeFirstLetter = (string: string) => {
        if (!string) return '';
        return string.charAt(0).toUpperCase() + string.slice(1);
      };

      const displayText = selectedWords.length > 0 
        ? capitalizeFirstLetter(selectedWords.map(w => w.text).join(' ')) + '.'
        : '...';

      return (
        <>
          {/* Top Navigation Bar */}
          <header className="bg-lichess-header shadow-md border-b border-lichess-border">
            <div className="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
              <div className="flex items-center space-x-3">
                <div className="w-8 h-8 rounded bg-lichess-text flex items-center justify-center text-lichess-bg font-bold text-xl">
                  ♞

                  tactics
                </h1>
              </div>

                <div className="text-sm font-semibold flex items-center space-x-2">
                  <span className="text-lichess-textDim uppercase tracking-widest text-xs">Streak</span>
                  <span className="text-xl text-white">{streak}</span>
                </div>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="flex-grow flex flex-col md:flex-row max-w-5xl mx-auto w-full p-4 md:p-6 gap-6">
            
            {/* Left Side: Board Area */}
            <div className="w-full md:w-2/3 flex flex-col gap-4">
              
              {/* Puzzle Info / Filter */}
              <div className="bg-lichess-header rounded p-3 flex justify-between items-center shadow-sm">
                <div className="flex items-center space-x-3">
                  <span className="text-lichess-textDim text-sm font-semibold uppercase">Pattern</span>
                  <select 
                    className="bg-lichess-board border border-lichess-border text-white text-sm rounded px-2 py-1 shadow-sm cursor-pointer"
                    value={filterType}
                    onChange={(e) => setFilterType(e.target.value)}
                  >
                    <option value="All">Mixed (150)</option>
                    <option value="SV">SV Pattern</option>
                    <option value="SVO">SVO Pattern</option>
                    <option value="SVC">SVC Pattern</option>
                    <option value="SVOO">SVOO Pattern</option>
                    <option value="SVOC">SVOC Pattern</option>
                  </select>
                </div>
                <span className="text-xs font-mono bg-lichess-board px-2 py-1 rounded border border-lichess-border text-lichess-text">
                  {currentSentence.type}
                </span>
              </div>

              {/* Target Meaning (Japanese) */}
              <div className="bg-lichess-header rounded p-8 shadow-sm flex items-center justify-center min-h-[120px] border-l-4 border-lichess-blue">
                <h2 className="text-2xl font-bold text-white text-center">
                  "{currentSentence.japanese}"
                </h2>
              </div>

              {/* Build Area */}
              <div className="flex flex-col gap-2 mt-2">
                <div className="text-lichess-textDim text-sm font-semibold uppercase tracking-wider pl-1">
                  Your Sentence
                </div>
                <div className="bg-lichess-header rounded min-h-[100px] border border-lichess-border flex items-center justify-center p-6 text-center">
                  <p className="text-2xl font-serif text-white tracking-wide">
                    {displayText}
                  </p>
                </div>
              </div>
            </div>

            {/* Right Side: Controls & Word Bank */}
            <div className="w-full md:w-1/3 flex flex-col gap-4">
              
              {/* Status Banner */}
              {status !== 'playing' && (
                <div className={`rounded p-4 shadow-sm flex flex-col items-center justify-center text-white ${status === 'correct' ? 'bg-lichess-green' : 'bg-lichess-red'}`}>
                  <span className="text-xl font-bold mb-1 flex items-center gap-2">
                    {status === 'correct' ? (
                      <><span className="text-2xl">✓</span> Puzzle solved</>
                    ) : (
                      <><span className="text-2xl">✗</span> Puzzle failed</>
                    )}
                  </span>
                  {status === 'incorrect' && (
                    <span className="text-sm mt-2 opacity-90">
                      Solution: <span className="font-bold">{currentSentence.english}.</span>
                    </span>
                  )}
                </div>
              )}

              {/* Action Buttons Container */}
              <div className="bg-lichess-header rounded p-4 shadow-sm border border-lichess-border flex flex-col gap-4">
                
                {/* Word Bank */}
                {status === 'playing' ? (
                  <div className="flex flex-col gap-3 min-h-[160px]">
                    <div className="text-lichess-textDim text-xs font-semibold uppercase tracking-wider mb-1">
                      Available Words
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {availableWords.map(word => (
                        <button
                          key={word.id}
                          onClick={() => handleSelectWord(word)}
                          className="word-btn px-4 py-2 bg-lichess-board text-lichess-text hover:text-white hover:bg-lichess-border font-medium rounded border border-lichess-border shadow-sm text-sm"
                        >
                          {word.text}
                        </button>
                      ))}
                    </div>
                    
                    {selectedWords.length > 0 && (
                      <div className="mt-4 border-t border-lichess-border pt-4">
                         <div className="text-lichess-textDim text-xs font-semibold uppercase tracking-wider mb-2">
                          Click to remove
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {selectedWords.map(word => (
                            <button
                              key={word.id}
                              onClick={() => handleDeselectWord(word)}
                              className="word-btn px-4 py-2 bg-lichess-blue text-white hover:bg-lichess-blueHover font-medium rounded shadow-sm text-sm"
                            >
                              {word.text}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                   <div className="flex flex-col items-center justify-center min-h-[160px] text-lichess-textDim text-sm">
                      Ready for the next challenge.
                   </div>
                )}

                {/* Primary Actions */}
                <div className="border-t border-lichess-border pt-4 mt-auto flex flex-col gap-2">
                  {status === 'playing' ? (
                    <>
                      <button
                        onClick={checkAnswer}
                        disabled={selectedWords.length === 0}
                        className="w-full py-3 bg-lichess-board text-lichess-text hover:text-white font-bold rounded shadow-sm hover:bg-lichess-border border border-lichess-border disabled:opacity-50 disabled:cursor-not-allowed uppercase tracking-wider text-sm transition-colors"
                      >
                        Submit Move
                      </button>
                      <button
                        onClick={handleReset}
                        className="w-full py-2 text-lichess-textDim hover:text-white text-xs uppercase tracking-wider transition-colors"
                      >
                        Reset Board
                      </button>
                    </>
                  ) : (
                    <button
                      onClick={handleNext}
                      className="w-full py-3 bg-lichess-blue text-white font-bold rounded shadow-sm hover:bg-lichess-blueHover uppercase tracking-wider text-sm transition-colors"
                    >
                      Next Puzzle
                    </button>
                  )}
                </div>

              </div>
            </div>

          </main>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
