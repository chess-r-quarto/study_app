<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JSON Merger - Lichess Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Register custom Babel preset for TSX syntax parsing
    Babel.registerPreset('tsx', {
      presets: [
        [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
        Babel.availablePresets['react']
      ]
    });
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Lichess color palette
            li: {
              bg: '#161512',
              surface: '#262421',
              surface2: '#302e2c',
              border: '#403d39',
              text: '#bababa',
              textHover: '#ffffff',
              green: '#629924',
              greenHover: '#77a73e',
              red: '#c33',
              redHover: '#d44'
            }
          },
          fontFamily: {
            sans: ['Roboto', 'Noto Sans', 'sans-serif'],
            mono: ['Consolas', 'Monaco', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    /* Lichess style scrollbars */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #161512; 
    }
    ::-webkit-scrollbar-thumb {
      background: #403d39; 
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #504d49; 
    }
    
    body {
      background-color: #161512;
      color: #bababa;
    }

    /* Dragging item visual feedback */
    .dragging {
      opacity: 0.4;
      background-color: #403d39 !important;
    }

    /* Lichess custom radio button style */
    input[type="radio"] {
      appearance: none;
      background-color: #161512;
      margin: 0;
      font: inherit;
      color: currentColor;
      width: 1.15em;
      height: 1.15em;
      border: 1px solid #629924;
      border-radius: 50%;
      display: grid;
      place-content: center;
      cursor: pointer;
    }
    input[type="radio"]::before {
      content: "";
      width: 0.65em;
      height: 0.65em;
      border-radius: 50%;
      transform: scale(0);
      transition: 120ms transform ease-in-out;
      box-shadow: inset 1em 1em #629924;
    }
    input[type="radio"]:checked::before {
      transform: scale(1);
    }
  </style>
</head>
<body class="font-sans min-h-screen flex flex-col">
  <!-- Initial Loading State (Replaced by React once compiled) -->
  <div id="root" class="flex-1 flex flex-col">
    <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
      <svg class="animate-spin h-12 w-12 text-[#629924] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <h2 class="text-xl font-bold text-white tracking-widest uppercase">Loading App</h2>
      <p class="text-sm text-[#bababa] mt-2">Compiling components in browser...</p>
    </div>
  </div>

  <script type="text/babel" data-presets="tsx">
    const { useState, useEffect, useRef } = React;

    // --- Types ---

    type MergeStrategy = 'array' | 'object' | 'wrap';

    interface FileData {
      id: string;
      name: string;
      content: any;
    }

    // --- Components ---

    const Button = ({ 
      onClick, 
      children, 
      variant = 'primary', 
      className = '', 
      disabled = false,
      title = ''
    }: { 
      onClick: (e?: React.MouseEvent) => void, 
      children: React.ReactNode, 
      variant?: 'primary' | 'secondary' | 'danger' | 'icon', 
      className?: string, 
      disabled?: boolean,
      title?: string
    }) => {
      const baseStyle = "font-bold uppercase tracking-wider text-sm transition-colors focus:outline-none flex items-center justify-center gap-2 rounded-sm disabled:opacity-50 disabled:cursor-not-allowed";
      
      const variants = {
        primary: "bg-li-green text-white hover:bg-li-greenHover px-4 py-2 shadow-[0_2px_0_rgba(0,0,0,0.2)]",
        secondary: "bg-li-surface2 text-li-text hover:text-white hover:bg-[#3c3936] px-4 py-2 border border-li-border",
        danger: "bg-li-red text-white hover:bg-li-redHover px-4 py-2 shadow-[0_2px_0_rgba(0,0,0,0.2)]",
        icon: "bg-transparent text-li-text hover:text-white p-2 hover:bg-li-border rounded-none"
      };
      
      return (
        <button 
          onClick={onClick} 
          disabled={disabled}
          title={title}
          className={`${baseStyle} ${variants[variant]} ${className}`}
        >
          {children}
        </button>
      );
    };

    const App = () => {
      const [filesData, setFilesData] = useState<FileData[]>([]);
      const [mergeStrategy, setMergeStrategy] = useState<MergeStrategy>('array');
      const [mergedJson, setMergedJson] = useState<string>('');
      const [error, setError] = useState<string | null>(null);
      const [isDraggingFile, setIsDraggingFile] = useState<boolean>(false);
      
      const fileInputRef = useRef<HTMLInputElement>(null);
      const dragItem = useRef<number | null>(null);
      const dragOverItem = useRef<number | null>(null);

      // We use a small delay for merging to prevent UI freeze on heavy JSONs
      useEffect(() => {
        const timeoutId = setTimeout(() => {
          mergeFiles();
        }, 100);
        return () => clearTimeout(timeoutId);
      }, [filesData, mergeStrategy]);

      const processFiles = async (files: File[]) => {
        setError(null);
        const newFilesData: FileData[] = [];
        
        for (const file of files) {
          try {
            const text = await file.text();
            const json = JSON.parse(text);
            newFilesData.push({
              id: Math.random().toString(36).substring(7),
              name: file.name,
              content: json,
            });
          } catch (err) {
            setError(`Failed to parse "${file.name}". Please ensure it's a valid JSON file.`);
            return;
          }
        }
        setFilesData(prev => [...prev, ...newFilesData]);
      };

      const handleFileSelect = (event: React.ChangeEvent<HTMLInputElement>) => {
        if (event.target.files) {
          processFiles(Array.from(event.target.files));
        }
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const handleFileDragOver = (e: React.DragEvent<HTMLDivElement>) => {
        e.preventDefault();
        setIsDraggingFile(true);
      };

      const handleFileDragLeave = (e: React.DragEvent<HTMLDivElement>) => {
        e.preventDefault();
        setIsDraggingFile(false);
      };

      const handleFileDrop = (e: React.DragEvent<HTMLDivElement>) => {
        e.preventDefault();
        setIsDraggingFile(false);
        if (e.dataTransfer.files) {
          const files = Array.from(e.dataTransfer.files).filter(
            f => f.name.endsWith('.json') || f.type === 'application/json'
          );
          if (files.length > 0) processFiles(files);
          else setError("Only JSON files are accepted.");
        }
      };

      const handleSortDragStart = (e: React.DragEvent<HTMLLIElement>, position: number) => {
        dragItem.current = position;
        e.currentTarget.classList.add('dragging');
      };

      const handleSortDragEnter = (e: React.DragEvent<HTMLLIElement>, position: number) => {
        dragOverItem.current = position;
      };

      const handleSortDragEnd = (e: React.DragEvent<HTMLLIElement>) => {
        e.currentTarget.classList.remove('dragging');
        if (dragItem.current !== null && dragOverItem.current !== null && dragItem.current !== dragOverItem.current) {
          const _filesData = [...filesData];
          const draggedItemContent = _filesData.splice(dragItem.current, 1)[0];
          _filesData.splice(dragOverItem.current, 0, draggedItemContent);
          setFilesData(_filesData);
        }
        dragItem.current = null;
        dragOverItem.current = null;
      };

      const moveFileUp = (index: number) => {
        if (index === 0) return;
        const newFiles = [...filesData];
        [newFiles[index - 1], newFiles[index]] = [newFiles[index], newFiles[index - 1]];
        setFilesData(newFiles);
      };

      const moveFileDown = (index: number) => {
        if (index === filesData.length - 1) return;
        const newFiles = [...filesData];
        [newFiles[index + 1], newFiles[index]] = [newFiles[index], newFiles[index + 1]];
        setFilesData(newFiles);
      };

      const sortFilesByName = (order: 'asc' | 'desc') => {
        setFilesData(prev => {
          const sorted = [...prev].sort((a, b) => {
            const nameA = a.name.toLowerCase();
            const nameB = b.name.toLowerCase();
            if (nameA < nameB) return order === 'asc' ? -1 : 1;
            if (nameA > nameB) return order === 'asc' ? 1 : -1;
            return 0;
          });
          return sorted;
        });
      };

      const removeFile = (id: string) => {
        setFilesData(prev => prev.filter(f => f.id !== id));
      };

      const mergeFiles = () => {
        if (filesData.length === 0) {
          setMergedJson('');
          return;
        }

        try {
          let result: any;
          switch (mergeStrategy) {
            case 'array':
              result = [];
              filesData.forEach(file => {
                if (Array.isArray(file.content)) result.push(...file.content);
                else result.push(file.content);
              });
              break;
            case 'object':
              result = {};
              filesData.forEach(file => {
                if (typeof file.content === 'object' && file.content !== null && !Array.isArray(file.content)) {
                  result = { ...result, ...file.content };
                } else {
                  result = { ...result, ...file.content };
                }
              });
              break;
            case 'wrap':
              result = filesData.map(f => f.content);
              break;
          }
          setMergedJson(JSON.stringify(result, null, 2));
        } catch (err) {
          setError("An unexpected error occurred during the merge process.");
        }
      };

      const downloadMergedJson = () => {
        if (!mergedJson) return;
        const blob = new Blob([mergedJson], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'merged.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      return (
        /* FIXED: Removed overall h-screen overflow-hidden to allow native scrolling on mobile/tablets */
        /* lg:h-screen lg:overflow-hidden is applied only for desktop views */
        <div className="max-w-[1200px] w-full mx-auto p-4 md:p-6 flex flex-col min-h-screen lg:h-screen lg:overflow-hidden">
          
          <header className="mb-6 flex justify-between items-center pb-4 border-b border-li-border flex-shrink-0">
            <div className="flex items-center gap-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square" strokeLinejoin="miter" className="text-white">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
                <line x1="15" y1="3" x2="15" y2="21"></line>
              </svg>
              <h1 className="text-2xl font-bold text-white tracking-wide">JSON MERGER</h1>
            </div>
            <div className="text-li-text text-sm hidden md:block">
              Browser-based utility
            </div>
          </header>

          <main className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 pb-6 lg:pb-2 lg:min-h-0">
            
            {/* Left Column: Input and Configuration */}
            <div className="lg:col-span-5 flex flex-col gap-4 lg:h-full lg:overflow-hidden">
              
              <div 
                className={`flex-shrink-0 border-2 border-dashed rounded-sm p-6 text-center transition-colors cursor-pointer ${
                  isDraggingFile ? 'border-li-green bg-[#1f2618]' : 'border-li-border bg-li-surface hover:bg-li-surface2'
                }`}
                onDragOver={handleFileDragOver}
                onDragLeave={handleFileDragLeave}
                onDrop={handleFileDrop}
                onClick={() => fileInputRef.current?.click()}
              >
                <input 
                  type="file" 
                  multiple 
                  accept=".json,application/json" 
                  className="hidden" 
                  ref={fileInputRef}
                  onChange={handleFileSelect}
                />
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter" className="mx-auto text-li-text mb-3">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <h3 className="text-base font-bold text-white uppercase tracking-wider mb-2">Upload Files</h3>
                <p className="text-li-text text-sm">Tap or drop JSON files here</p>
              </div>

              {error && (
                <div className="flex-shrink-0 bg-[#3a1a1a] border border-li-red p-3 rounded-sm flex items-start gap-3">
                  <svg className="h-5 w-5 text-li-red flex-shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                  </svg>
                  <p className="text-sm text-white">{error}</p>
                </div>
              )}

              <div className="flex-shrink-0 bg-li-surface p-4 rounded-sm border border-li-border shadow-md">
                <h3 className="text-xs font-bold text-white uppercase tracking-widest mb-4 border-b border-li-border pb-2">Merge Strategy</h3>
                <div className="space-y-4">
                  
                  <label className="flex items-start gap-3 cursor-pointer group">
                    <input 
                      type="radio" 
                      name="strategy" 
                      value="array" 
                      checked={mergeStrategy === 'array'} 
                      onChange={() => setMergeStrategy('array')}
                      className="mt-1"
                    />
                    <div>
                      <div className="font-bold text-white text-sm group-hover:text-li-green transition-colors">Flatten Array</div>
                      <div className="text-xs text-li-text mt-1">Extract array contents into a single flat array.<br/>Ex: <code className="bg-[#1b1a18] px-1 py-0.5 border border-li-border text-[#93a1a1] rounded-sm font-mono">[1,2] + [3] &rarr; [1,2,3]</code></div>
                    </div>
                  </label>
                  
                  <label className="flex items-start gap-3 cursor-pointer group">
                    <input 
                      type="radio" 
                      name="strategy" 
                      value="object" 
                      checked={mergeStrategy === 'object'} 
                      onChange={() => setMergeStrategy('object')}
                      className="mt-1"
                    />
                    <div>
                      <div className="font-bold text-white text-sm group-hover:text-li-green transition-colors">Object Assign</div>
                      <div className="text-xs text-li-text mt-1">Merge properties. Later files overwrite existing keys.<br/>Ex: <code className="bg-[#1b1a18] px-1 py-0.5 border border-li-border text-[#93a1a1] rounded-sm font-mono">{"{a:1} + {b:2} \u2192 {a:1, b:2}"}</code></div>
                    </div>
                  </label>

                  <label className="flex items-start gap-3 cursor-pointer group">
                    <input 
                      type="radio" 
                      name="strategy" 
                      value="wrap" 
                      checked={mergeStrategy === 'wrap'} 
                      onChange={() => setMergeStrategy('wrap')}
                      className="mt-1"
                    />
                    <div>
                      <div className="font-bold text-white text-sm group-hover:text-li-green transition-colors">Wrap in Array</div>
                      <div className="text-xs text-li-text mt-1">Keep files intact as elements of a new array.<br/>Ex: <code className="bg-[#1b1a18] px-1 py-0.5 border border-li-border text-[#93a1a1] rounded-sm font-mono">{"{a:1} + {b:2} \u2192 [{a:1}, {b:2}]"}</code></div>
                    </div>
                  </label>
                  
                </div>
              </div>

              {filesData.length > 0 && (
                <div className="flex flex-col bg-li-surface p-4 rounded-sm border border-li-border shadow-md max-h-[50vh] lg:max-h-none lg:min-h-0 lg:flex-1">
                  <div className="flex flex-wrap justify-between items-center gap-2 mb-3 border-b border-li-border pb-2 flex-shrink-0">
                    <h3 className="text-xs font-bold text-white uppercase tracking-widest whitespace-nowrap">
                      Loaded Files ({filesData.length})
                    </h3>
                    <div className="flex items-center gap-2">
                      {filesData.length > 1 && (
                        <div className="flex items-center gap-1 border-r border-li-border pr-2">
                          <Button variant="secondary" onClick={() => sortFilesByName('asc')} className="!text-[10px] !py-1 !px-2 uppercase" title="Sort A to Z">
                            A-Z ↓
                          </Button>
                          <Button variant="secondary" onClick={() => sortFilesByName('desc')} className="!text-[10px] !py-1 !px-2 uppercase" title="Sort Z to A">
                            Z-A ↑
                          </Button>
                        </div>
                      )}
                      <Button variant="secondary" onClick={() => setFilesData([])} className="!text-[10px] !py-1 !px-2 uppercase">
                        Clear All
                      </Button>
                    </div>
                  </div>
                  
                  <ul className="space-y-1 overflow-y-auto pr-1 flex-1 pb-1">
                    {filesData.map((file, index) => (
                      <li 
                        key={file.id} 
                        draggable
                        onDragStart={(e) => handleSortDragStart(e, index)}
                        onDragEnter={(e) => handleSortDragEnter(e, index)}
                        onDragEnd={handleSortDragEnd}
                        onDragOver={(e) => e.preventDefault()}
                        className="flex justify-between items-center bg-li-surface2 p-1 pl-3 border border-[#3e3b38] hover:border-[#504d49] transition-colors group cursor-grab active:cursor-grabbing"
                      >
                        <div className="flex items-center overflow-hidden flex-1">
                          <div className="text-li-border group-hover:text-li-text mr-3 hidden md:block">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square" strokeLinejoin="miter">
                              <line x1="4" y1="12" x2="20" y2="12"></line>
                              <line x1="4" y1="6" x2="20" y2="6"></line>
                              <line x1="4" y1="18" x2="20" y2="18"></line>
                            </svg>
                          </div>
                          <span className="text-sm font-medium text-white truncate font-mono" title={file.name}>
                            {file.name}
                          </span>
                        </div>
                        
                        <div className="flex items-center ml-2 bg-li-bg rounded-sm border border-li-border overflow-hidden flex-shrink-0">
                          <button 
                            onClick={(e) => { e.stopPropagation(); moveFileUp(index); }}
                            disabled={index === 0}
                            className="p-2 text-li-text hover:text-white hover:bg-[#36322f] disabled:opacity-30 disabled:hover:bg-transparent transition-colors touch-manipulation"
                            title="Move Up"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="square" strokeLinejoin="miter">
                              <polyline points="18 15 12 9 6 15"></polyline>
                            </svg>
                          </button>
                          <div className="w-px h-6 bg-li-border"></div>
                          <button 
                            onClick={(e) => { e.stopPropagation(); moveFileDown(index); }}
                            disabled={index === filesData.length - 1}
                            className="p-2 text-li-text hover:text-white hover:bg-[#36322f] disabled:opacity-30 disabled:hover:bg-transparent transition-colors touch-manipulation"
                            title="Move Down"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="square" strokeLinejoin="miter">
                              <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                          </button>
                          <div className="w-px h-6 bg-li-border"></div>
                          <button 
                            onClick={(e) => { e.stopPropagation(); removeFile(file.id); }}
                            className="p-2 text-li-text hover:text-li-red hover:bg-[#3a1a1a] transition-colors touch-manipulation"
                            title="Remove"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="square" strokeLinejoin="miter">
                              <line x1="18" y1="6" x2="6" y2="18"></line>
                              <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                          </button>
                        </div>
                      </li>
                    ))}
                  </ul>
                </div>
              )}
            </div>

            {/* Right Column: Result Preview and Export */}
            <div className="lg:col-span-7 flex flex-col h-[600px] lg:h-full overflow-hidden bg-li-surface rounded-sm border border-li-border shadow-md">
              <div className="p-3 border-b border-li-border flex justify-between items-center bg-[#211f1c] flex-shrink-0">
                <h3 className="text-xs font-bold text-white uppercase tracking-widest pl-2">Preview</h3>
                <Button 
                  onClick={downloadMergedJson} 
                  disabled={!mergedJson || filesData.length === 0}
                  className="!py-1.5 !text-xs"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square" strokeLinejoin="miter" className="mr-1">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                  DOWNLOAD JSON
                </Button>
              </div>
              
              <div className="flex-1 p-0 overflow-hidden relative bg-[#1b1a18]">
                {filesData.length === 0 ? (
                  <div className="absolute inset-0 flex items-center justify-center text-li-border text-sm p-6 text-center font-mono">
                    // Awaiting data...
                  </div>
                ) : (
                  <textarea
                    readOnly
                    value={mergedJson}
                    className="w-full h-full p-4 font-mono text-sm bg-transparent text-[#93a1a1] resize-none focus:outline-none"
                    spellCheck="false"
                  />
                )}
              </div>
            </div>
            
          </main>
        </div>
      );
    };

    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    }
  </script>
</body>
</html>
