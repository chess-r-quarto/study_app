<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP技能士 統計分析（独自推計モデル）</title>
  
  <!-- Style & Libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    Babel.registerPreset('tsx', {
      presets: [
        [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
        Babel.availablePresets['react']
      ]
    });
  </script>
</head>
<body class="bg-gray-50 text-slate-900 min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-presets="tsx">
    const { useState } = React;
    const { 
      PieChart, Pie, Cell, Tooltip, Legend, ResponsiveContainer
    } = window.Recharts;

    // --- Aggregation Logic (Original Estimation) ---
    // Rule 1: Use only "Asset Design" from JAFP
    // Rule 2: Use all subjects EXCEPT "Asset Design" from Kinzai
    const DATA = {
      g1: [
        { name: 'きんざい (1級)', value: 33806, color: '#1E3A8A' },
        { name: 'FP協会 (資産設計)', value: 25539, color: '#3B82F6' },
      ],
      g2: [
        { name: '資産設計提案 (協会のみ)', value: 599779, color: '#059669' },
        { name: '個人資産相談 (金財)', value: 373736, color: '#10B981' },
        { name: '生保顧客資産 (金財)', value: 162884, color: '#34D399' },
        { name: '中小事業主 (金財)', value: 57606, color: '#6EE7B7' },
        { name: '損保顧客資産 (金財)', value: 5266, color: '#A7F3D0' },
      ],
      g3: [
        { name: '資産設計提案 (協会のみ)', value: 719796, color: '#D97706' },
        { name: '個人資産相談 (金財)', value: 674620, color: '#F59E0B' },
        { name: '保険顧客資産 (金財)', value: 406403, color: '#FBBF24' },
      ]
    };

    const OVERALL = [
      { name: '1級', value: DATA.g1.reduce((s, a) => s + a.value, 0), color: '#2563EB' },
      { name: '2級', value: DATA.g2.reduce((s, a) => s + a.value, 0), color: '#10B981' },
      { name: '3級', value: DATA.g3.reduce((s, a) => s + a.value, 0), color: '#F59E0B' },
    ];

    const formatNum = (v: number) => v.toLocaleString();

    const App = () => {
      const [view, setView] = useState('overall');

      const activeData = view === 'overall' ? OVERALL : DATA[view as keyof typeof DATA];
      const totalInView = activeData.reduce((s, a) => s + a.value, 0);

      const CustomTooltip = ({ active, payload }: any) => {
        if (active && payload && payload.length) {
          const d = payload[0].payload;
          return (
            <div className="bg-white/95 backdrop-blur-md p-4 shadow-2xl rounded-xl border border-slate-200">
              <p className="font-bold text-slate-800 text-sm mb-1">{d.name}</p>
              <div className="flex items-baseline gap-1">
                <span className="text-xl font-black text-slate-900">{formatNum(d.value)}</span>
                <span className="text-xs text-slate-500 font-bold">人</span>
              </div>
              <div className="mt-2 text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full inline-block">
                シェア: {((d.value / totalInView) * 100).toFixed(1)}%
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="max-w-4xl mx-auto px-4 py-12">
          <header className="text-center mb-12">
            <div className="inline-block bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full mb-4 uppercase tracking-widest">
              Original Statistics Model
            </div>
            <h1 className="text-3xl md:text-4xl font-black text-slate-900 tracking-tighter mb-4">
              FP技能士 累計取得者の実質分布
            </h1>
            <p className="text-slate-500 font-medium max-w-2xl mx-auto leading-relaxed">
              きんざい（全専門科目）とFP協会（資産設計）を名寄せし、重複を排除した独自集計による推計値です。
            </p>
          </header>

          {/* Key Totals */}
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
            <StatBox label="総実質取得者数" value={formatNum(OVERALL.reduce((s,a)=>s+a.value,0))} sub="1級〜3級 合計" color="border-slate-900" />
            <StatBox label="2級実質累計" value={formatNum(OVERALL[1].value)} sub="中核受検層" color="border-emerald-500" />
            <StatBox label="3級実質累計" value={formatNum(OVERALL[2].value)} sub="入門受検層" color="border-amber-500" />
          </div>

          <div className="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/50 border border-slate-100 p-6 md:p-10">
            {/* Tabs Control */}
            <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-10 max-w-md mx-auto">
              <TabBtn active={view === 'overall'} onClick={() => setView('overall')} label="級別全体" />
              <TabBtn active={view === 'g1'} onClick={() => setView('g1')} label="1級" />
              <TabBtn active={view === 'g2'} onClick={() => setView('g2')} label="2級" />
              <TabBtn active={view === 'g3'} onClick={() => setView('g3')} label="3級" />
            </div>

            <div className="flex flex-col md:flex-row items-center justify-between gap-12">
              <div className="w-full md:w-1/2 h-[380px] relative">
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie
                      data={activeData}
                      cx="50%" cy="50%"
                      innerRadius={90}
                      outerRadius={140}
                      paddingAngle={6}
                      dataKey="value"
                      stroke="none"
                      animationBegin={0}
                      animationDuration={1200}
                    >
                      {activeData.map((entry, index) => (
                        <Cell key={`cell-${index}`} fill={entry.color} />
                      ))}
                    </Pie>
                    <Tooltip content={<CustomTooltip />} />
                  </PieChart>
                </ResponsiveContainer>
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none">
                  <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total</p>
                  <p className="text-2xl font-black text-slate-800">{formatNum(totalInView)}</p>
                </div>
              </div>

              <div className="w-full md:w-1/2 space-y-4">
                <h3 className="text-lg font-black text-slate-800 mb-6 flex items-center gap-2">
                  <span className="w-1.5 h-6 bg-blue-600 rounded-full"></span>
                  {view === 'overall' ? '級別取得者シェア' : `${view.replace('g','')}級 科目別シェア`}
                </h3>
                {activeData.map((item, i) => (
                  <div key={i} className="group p-4 bg-slate-50 rounded-2xl border border-transparent hover:border-slate-200 transition-all">
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-3">
                        <div className="w-3 h-3 rounded-full" style={{backgroundColor: item.color}}></div>
                        <span className="text-sm font-bold text-slate-700">{item.name}</span>
                      </div>
                      <span className="text-xs font-black text-slate-400">
                        {((item.value / totalInView) * 100).toFixed(1)}%
                      </span>
                    </div>
                    <div className="flex items-baseline gap-1">
                      <span className="text-lg font-black text-slate-900">{formatNum(item.value)}</span>
                      <span className="text-[10px] font-bold text-slate-400">人</span>
                    </div>
                    <div className="mt-2 h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
                      <div className="h-full rounded-full transition-all duration-1000" style={{backgroundColor: item.color, width: `${(item.value / totalInView) * 100}%`}}></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Disclaimer / Note */}
          <footer className="mt-12 bg-amber-50 border border-amber-100 rounded-2xl p-6 text-sm text-amber-900 leading-relaxed shadow-sm">
            <div className="flex items-start gap-4">
              <div className="mt-1 text-amber-500">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
              </div>
              <div>
                <h4 className="font-black mb-1">本集計に関する重要事項（独自推計モデル）</h4>
                <p className="opacity-80 font-medium">
                  本統計は、実施機関（きんざい・日本FP協会）間の重複計上を排除するため、以下のロジックに基づき算出された<strong>独自集計による推計</strong>です。
                </p>
                <ul className="mt-3 space-y-2 font-medium opacity-90">
                  <li className="flex gap-2"><span>・</span><span><strong>日本FP協会:</strong> 資産設計提案業務のみを計上（他科目への免除申請等の重複を排除）。</span></li>
                  <li className="flex gap-2"><span>・</span><span><strong>きんざい:</strong> 全科目から「資産設計提案業務」を除外して計上。</span></li>
                  <li className="flex gap-2"><span>・</span><span><strong>1級技能士:</strong> それぞれの実施機関が独立した試験体系を持つため、両者の合格実績を合算して全体像を算出。</span></li>
                </ul>
                <p className="mt-3 text-[11px] font-bold text-amber-700/60">
                  ※各実施機関が発表する公式の「延べ合格者数」とは、重複排除の観点から数値が異なります。
                </p>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const StatBox = ({ label, value, sub, color }) => (
      <div className={`bg-white p-6 rounded-3xl border-b-4 shadow-sm border ${color}`}>
        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{label}</p>
        <p className="text-3xl font-black text-slate-900 mb-1">{value}</p>
        <p className="text-[10px] font-bold text-slate-400">{sub}</p>
      </div>
    );

    const TabBtn = ({ active, onClick, label }) => (
      <button 
        onClick={onClick}
        className={`flex-1 py-3 px-2 text-xs font-black rounded-xl transition-all duration-300 ${
          active 
          ? 'bg-white shadow-md text-blue-600' 
          : 'text-slate-400 hover:text-slate-600 hover:bg-slate-200/50'
        }`}
      >
        {label}
      </button>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
