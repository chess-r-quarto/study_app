<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語構文の視覚化アプローチ (JSON縦持ち追加版)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for in-browser JSX/TSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Custom Babel Preset Config for TSX -->
    <script>
        Babel.registerPreset('tsx', {
            presets: [
                [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
                Babel.availablePresets['react']
            ]
        });
    </script>
</head>
<body class="bg-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-presets="tsx">
        const { useState } = React;

        // --- Components ---

        const ToggleM = ({ showM, setShowM }) => (
            <div className="flex justify-center my-8 sticky top-4 z-50">
                <label className="flex items-center cursor-pointer bg-white/90 backdrop-blur-sm px-6 py-4 rounded-2xl shadow-lg border border-slate-200 hover:bg-blue-50 transition-colors">
                    <div className="mr-4 font-bold text-lg text-slate-700">M（修飾語）を表示する</div>
                    <div className="relative">
                        <input type="checkbox" className="sr-only" checked={showM} onChange={() => setShowM(!showM)} />
                        <div className={`block w-14 h-8 rounded-full transition-colors ${showM ? 'bg-blue-500' : 'bg-slate-300'}`}></div>
                        <div className={`dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform ${showM ? 'transform translate-x-6' : ''}`}></div>
                    </div>
                </label>
            </div>
        );

        const AmericanDiagram = ({ showM }) => (
            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full">
                <h3 className="text-xl font-bold text-slate-800 mb-2 flex items-center w-full">
                    <span className="text-3xl mr-3">🇺🇸</span> 
                    <div>
                        アメリカ式
                        <span className="block text-xs font-normal text-slate-500 mt-1">階層構造ツリー (Reed-Kellogg図解)</span>
                    </div>
                </h3>
                <p className="text-sm text-slate-600 mb-6 text-left w-full h-16 leading-relaxed">
                    文の「階層構造」を視覚化します。主幹（S-V-O）を一本の線に引き、M（修飾語）はそこからぶら下がる「枝」として描画されるため、骨格がブレません。
                </p>

                <svg viewBox="0 0 500 220" className="w-full bg-slate-50 rounded-xl border border-slate-200 shadow-inner h-48">
                    {/* Main Line (S-V-O) */}
                    <line x1="40" y1="80" x2="460" y2="80" stroke="#1e293b" strokeWidth="3" strokeLinecap="round" />
                    
                    {/* S / V Separator */}
                    <line x1="180" y1="50" x2="180" y2="110" stroke="#1e293b" strokeWidth="3" strokeLinecap="round" />
                    
                    {/* V / O Separator */}
                    <line x1="320" y1="50" x2="320" y2="80" stroke="#1e293b" strokeWidth="3" strokeLinecap="round" />

                    {/* Core Elements */}
                    <text x="110" y="70" fontSize="22" fill="#1e293b" textAnchor="middle" fontWeight="bold">dog</text>
                    <text x="250" y="70" fontSize="22" fill="#1e293b" textAnchor="middle" fontWeight="bold">ate</text>
                    <text x="390" y="70" fontSize="22" fill="#1e293b" textAnchor="middle" fontWeight="bold">bone</text>

                    {/* Syntax Labels */}
                    <text x="110" y="40" fontSize="14" fill="#94a3b8" textAnchor="middle" fontWeight="bold">S</text>
                    <text x="250" y="40" fontSize="14" fill="#94a3b8" textAnchor="middle" fontWeight="bold">V</text>
                    <text x="390" y="40" fontSize="14" fill="#94a3b8" textAnchor="middle" fontWeight="bold">O</text>

                    {/* Modifiers (Branches) */}
                    <g className={`transition-opacity duration-500 ease-in-out ${showM ? 'opacity-100' : 'opacity-0'}`} stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round">
                        {/* dog modifiers */}
                        <line x1="70" y1="80" x2="100" y2="140" />
                        <text x="75" y="125" fontSize="15" fill="#3b82f6" transform="rotate(63, 75, 125)" strokeWidth="0" fontWeight="bold">The</text>

                        <line x1="110" y1="80" x2="140" y2="140" />
                        <text x="115" y="125" fontSize="15" fill="#3b82f6" transform="rotate(63, 115, 125)" strokeWidth="0" fontWeight="bold">cute</text>

                        {/* ate modifiers */}
                        <line x1="230" y1="80" x2="260" y2="140" />
                        <text x="235" y="125" fontSize="15" fill="#3b82f6" transform="rotate(63, 235, 125)" strokeWidth="0" fontWeight="bold">quickly</text>

                        {/* bone modifiers */}
                        <line x1="360" y1="80" x2="390" y2="140" />
                        <text x="365" y="125" fontSize="15" fill="#3b82f6" transform="rotate(63, 365, 125)" strokeWidth="0" fontWeight="bold">the</text>

                        <line x1="400" y1="80" x2="430" y2="140" />
                        <text x="405" y="125" fontSize="15" fill="#3b82f6" transform="rotate(63, 405, 125)" strokeWidth="0" fontWeight="bold">big</text>
                    </g>
                </svg>
            </div>
        );

        const IndianDiagram = ({ showM }) => (
            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full">
                <h3 className="text-xl font-bold text-slate-800 mb-2 flex items-center w-full">
                    <span className="text-3xl mr-3">🇮🇳</span> 
                    <div>
                        インド式
                        <span className="block text-xs font-normal text-slate-500 mt-1">コア＋後乗せモジュール</span>
                    </div>
                </h3>
                <p className="text-sm text-slate-600 mb-6 text-left w-full h-16 leading-relaxed">
                    「伝えること」に特化した実践的アプローチ。コアとなる行動（SVO等）を真っ先にブロックとして置き、Mは後から「追加モジュール」として放り込みます。
                </p>

                <div className="w-full bg-slate-50 rounded-xl border border-slate-200 p-6 flex flex-col justify-center shadow-inner h-48 relative">
                    {/* Core Block */}
                    <div className="flex justify-center items-center gap-2 mb-2 relative z-10">
                        <div className="bg-orange-500 text-white px-5 py-3 rounded-xl font-bold text-lg shadow-md w-1/3 text-center">
                            <span className="text-orange-200 text-xs block mb-1">A (誰が)</span>
                            dog
                        </div>
                        <div className="text-orange-500 font-black text-xl px-2">does</div>
                        <div className="bg-orange-500 text-white px-5 py-3 rounded-xl font-bold text-lg shadow-md w-1/3 text-center">
                            <span className="text-orange-200 text-xs block mb-1">B (何を)</span>
                            ate bone
                        </div>
                    </div>

                    {/* Modifiers Module */}
                    <div className={`transition-all duration-500 ease-in-out overflow-hidden flex justify-center w-full ${showM ? 'opacity-100 max-h-32 mt-4' : 'opacity-0 max-h-0 mt-0'}`}>
                        <div className="flex flex-wrap justify-center items-center gap-2 bg-blue-50 border-2 border-blue-200 p-3 rounded-xl w-full">
                            <div className="text-blue-500 font-black text-xl mr-2">+</div>
                            <div className="bg-white text-blue-600 border border-blue-300 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm">The cute</div>
                            <div className="bg-white text-blue-600 border border-blue-300 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm">quickly</div>
                            <div className="bg-white text-blue-600 border border-blue-300 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm">the big</div>
                            <div className="w-full text-center mt-1 text-xs text-blue-500 font-bold tracking-wider">M（細かい情報は後から足す）</div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const JsonDiagram = ({ showM }) => (
            <div className="bg-slate-900 p-6 md:p-8 rounded-2xl shadow-lg border border-slate-700 flex flex-col h-full relative overflow-hidden">
                {/* Decorative code background elements */}
                <div className="absolute top-0 right-0 -mt-4 -mr-4 text-slate-800 opacity-20 pointer-events-none font-mono text-9xl">{"{}"}</div>
                
                <h3 className="text-xl font-bold text-white mb-2 flex items-center w-full z-10">
                    <span className="text-3xl mr-3">💻</span> 
                    <div>
                        オリジナル：JSON縦持ち式
                        <span className="block text-xs font-normal text-green-400 mt-1">Syntax as Code アプローチ</span>
                    </div>
                </h3>
                <p className="text-sm text-slate-300 mb-6 text-left w-full h-16 leading-relaxed z-10">
                    英文をオブジェクト（辞書型）のキーと値として解釈します。Mがどんなに長くなっても独立したプロパティになるため、<b>必須引数（S, V, O）が絶対に埋もれません。</b>
                </p>

                <div className="w-full bg-black/60 backdrop-blur-md rounded-xl p-5 shadow-inner border border-slate-700/50 flex flex-col justify-center h-48 z-10 overflow-hidden">
                    <pre className="font-mono text-sm md:text-base leading-relaxed">
                        <span className="text-slate-400">{"{"}</span><br/>
                        
                        <div className={`overflow-hidden transition-all duration-500 ease-in-out ${showM ? 'opacity-100 max-h-8' : 'opacity-0 max-h-0'}`}>
                            <span className="text-pink-400 ml-4">"mod_S"</span><span className="text-slate-400">: </span><span className="text-yellow-300">"The cute"</span><span className="text-slate-400">,</span>
                        </div>
                        
                        <div className="ml-4">
                            <span className="text-blue-400 font-bold">"Subject"</span><span className="text-slate-400">: </span><span className="text-green-400 font-bold bg-green-900/30 px-1 rounded">"dog"</span><span className="text-slate-400">,</span>
                        </div>
                        
                        <div className={`overflow-hidden transition-all duration-500 ease-in-out ${showM ? 'opacity-100 max-h-8' : 'opacity-0 max-h-0'}`}>
                            <span className="text-pink-400 ml-4">"mod_V"</span><span className="text-slate-400">: </span><span className="text-yellow-300">"quickly"</span><span className="text-slate-400">,</span>
                        </div>

                        <div className="ml-4">
                            <span className="text-blue-400 font-bold">"Verb"</span><span className="text-slate-400">:    </span><span className="text-green-400 font-bold bg-green-900/30 px-1 rounded">"ate"</span><span className="text-slate-400">,</span>
                        </div>

                        <div className={`overflow-hidden transition-all duration-500 ease-in-out ${showM ? 'opacity-100 max-h-8' : 'opacity-0 max-h-0'}`}>
                            <span className="text-pink-400 ml-4">"mod_O"</span><span className="text-slate-400">: </span><span className="text-yellow-300">"the big"</span><span className="text-slate-400">,</span>
                        </div>

                        <div className="ml-4">
                            <span className="text-blue-400 font-bold">"Object"</span><span className="text-slate-400">:  </span><span className="text-green-400 font-bold bg-green-900/30 px-1 rounded">"bone"</span>
                        </div>
                        
                        <span className="text-slate-400">{"}"}</span>
                    </pre>
                </div>
            </div>
        );

        const JapaneseDiagram = ({ showM }) => (
            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full">
                <h3 className="text-xl font-bold text-slate-800 mb-2 flex items-center">
                    <span className="text-3xl mr-3">🇯🇵</span> 
                    <div>
                        日本式（比較用）
                        <span className="block text-xs font-normal text-slate-500 mt-1">直列5文型パズル</span>
                    </div>
                </h3>
                <p className="text-sm text-slate-600 mb-6 text-left w-full h-16 leading-relaxed">
                    すべてが1本の線に並ぶため、長文になると骨組みと飾りの区別がつかなくなりがちです。<br/>
                    <span className="font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded inline-block mt-1 text-xs border border-rose-100">
                        ※ Mを教わらないのにMの穴埋めをさせられる原因
                    </span>
                </p>

                <div className="w-full bg-slate-50 rounded-xl border border-slate-200 p-6 overflow-x-auto shadow-inner flex flex-col justify-center h-48">
                    <div className="flex items-center gap-1.5 min-w-max pb-2">
                        {/* CSS Transitions on width and opacity to simulate appearing in the flow */}
                        <div className={`overflow-hidden transition-all duration-500 ease-in-out flex gap-1.5 ${showM ? 'opacity-100 w-auto' : 'opacity-0 w-0'}`}>
                            <div className="bg-blue-100 border-2 border-blue-300 text-blue-700 px-3 py-2 rounded-lg font-bold shadow-sm whitespace-nowrap">The (M)</div>
                            <div className="bg-blue-100 border-2 border-blue-300 text-blue-700 px-3 py-2 rounded-lg font-bold shadow-sm whitespace-nowrap">cute (M)</div>
                        </div>
                        
                        <div className="bg-slate-700 border-2 border-slate-800 text-white px-4 py-2 rounded-lg font-bold shadow-sm z-10 flex-shrink-0">dog (S)</div>
                        
                        <div className={`overflow-hidden transition-all duration-500 ease-in-out flex gap-1.5 ${showM ? 'opacity-100 w-auto' : 'opacity-0 w-0'}`}>
                            <div className="bg-blue-100 border-2 border-blue-300 text-blue-700 px-3 py-2 rounded-lg font-bold shadow-sm whitespace-nowrap">quickly (M)</div>
                        </div>

                        <div className="bg-slate-700 border-2 border-slate-800 text-white px-4 py-2 rounded-lg font-bold shadow-sm z-10 flex-shrink-0">ate (V)</div>
                        
                        <div className={`overflow-hidden transition-all duration-500 ease-in-out flex gap-1.5 ${showM ? 'opacity-100 w-auto' : 'opacity-0 w-0'}`}>
                            <div className="bg-blue-100 border-2 border-blue-300 text-blue-700 px-3 py-2 rounded-lg font-bold shadow-sm whitespace-nowrap">the (M)</div>
                            <div className="bg-blue-100 border-2 border-blue-300 text-blue-700 px-3 py-2 rounded-lg font-bold shadow-sm whitespace-nowrap">big (M)</div>
                        </div>

                        <div className="bg-slate-700 border-2 border-slate-800 text-white px-4 py-2 rounded-lg font-bold shadow-sm z-10 flex-shrink-0">bone (O)</div>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [showM, setShowM] = useState(false);

            return (
                <div className="min-h-screen max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
                    {/* Header */}
                    <div className="text-center mb-8">
                        <h1 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight mb-4">
                            英語構文モデルの比較
                        </h1>
                        <p className="text-lg text-slate-600 max-w-2xl mx-auto">
                            「The cute dog quickly ate the big bone.」を例に、<br className="hidden md:block" />
                            異なるアプローチが <strong>M（修飾語）</strong> をどう処理しているか比較します。
                        </p>
                    </div>

                    {/* Interactive Toggle */}
                    <ToggleM showM={showM} setShowM={setShowM} />

                    {/* Comparison Grid (2x2) */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
                        <AmericanDiagram showM={showM} />
                        <IndianDiagram showM={showM} />
                        <JsonDiagram showM={showM} />
                        <JapaneseDiagram showM={showM} />
                    </div>
                </div>
            );
        };

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
