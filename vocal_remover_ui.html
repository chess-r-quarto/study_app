<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボーカル除去ツール</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel (for in-browser TSX compilation) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* カスタムスクロールバーなどの微調整 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div id="root" class="w-full max-w-2xl"></div>

    <!-- カスタムBabelプリセットの登録 -->
    <script>
        Babel.registerPreset('tsx', {
            presets: [
                [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
                Babel.availablePresets['react']
            ]
        });
    </script>

    <!-- アプリケーションロジック -->
    <script type="text/babel" data-presets="tsx">
        const { useState, useRef } = React;

        // --- 型定義 ---
        type ProcessingMethod = 'ai' | 'phase';
        type AppStatus = 'idle' | 'processing' | 'completed' | 'error';

        // --- アイコンコンポーネント ---
        const UploadIcon = () => (
            <svg className="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
        );

        const MusicIcon = () => (
            <svg className="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
            </svg>
        );

        const DownloadIcon = () => (
            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
        );

        const SpinnerIcon = () => (
            <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        );

        // --- メインコンポーネント ---
        const App = () => {
            const [file, setFile] = useState<File | null>(null);
            const [method, setMethod] = useState<ProcessingMethod>('phase');
            const [status, setStatus] = useState<AppStatus>('idle');
            const [progress, setProgress] = useState<number>(0);
            const [isDragging, setIsDragging] = useState<boolean>(false);
            const fileInputRef = useRef<HTMLInputElement>(null);

            const [downloadLinks, setDownloadLinks] = useState<{instrumental?: string, vocals?: string} | null>(null);

            // ドラッグ＆ドロップのハンドラー
            const handleDragOver = (e: React.DragEvent<HTMLDivElement>) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e: React.DragEvent<HTMLDivElement>) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const handleDrop = (e: React.DragEvent<HTMLDivElement>) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const droppedFile = e.dataTransfer.files[0];
                    if (droppedFile.type.startsWith('audio/')) {
                        setFile(droppedFile);
                        setStatus('idle');
                        setProgress(0);
                        setDownloadLinks(null);
                    } else {
                        alert('オーディオファイルを選択してください。');
                    }
                }
            };

            const handleFileChange = (e: React.ChangeEvent<HTMLInputElement>) => {
                if (e.target.files && e.target.files.length > 0) {
                    setFile(e.target.files[0]);
                    setStatus('idle');
                    setProgress(0);
                    setDownloadLinks(null);
                }
            };

            // 処理開始の関数（APIを叩く）
            const handleStartProcessing = async () => {
                if (!file) return;
                
                setStatus('processing');
                setProgress(10); // 初期進捗

                // 見た目のためのアニメーション
                const interval = setInterval(() => {
                    setProgress((prev) => {
                        if (prev >= 95) return 95; // 実際の処理が終わるまで95で止める
                        const increment = method === 'ai' ? 2 : 10;
                        return Math.min(prev + increment, 95);
                    });
                }, 1000);

                const formData = new FormData();
                formData.append('file', file);
                formData.append('method', method);

                try {
                    const response = await fetch('/api/process', {
                        method: 'POST',
                        body: formData
                    });

                    clearInterval(interval);
                    setProgress(100);

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.detail || 'エラーが発生しました');
                    }

                    const data = await response.json();
                    setDownloadLinks(data.files);
                    setStatus('completed');
                } catch (error) {
                    clearInterval(interval);
                    console.error('処理エラー:', error);
                    alert(`処理中にエラーが発生しました: ${error.message}`);
                    setStatus('idle');
                    setProgress(0);
                }
            };

            const handleReset = () => {
                setFile(null);
                setStatus('idle');
                setProgress(0);
                setDownloadLinks(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                }
            };

            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                    <div className="bg-indigo-600 p-6 text-white text-center">
                        <h1 className="text-2xl font-bold mb-2">Vocal Remover</h1>
                        <p className="text-indigo-100 text-sm">オーディオファイルからボーカルを高精度に分離・除去します</p>
                    </div>

                    <div className="p-8">
                        {status === 'idle' && (
                            <div className="space-y-6">
                                {/* ファイルアップロードエリア */}
                                <div 
                                    className={`border-2 border-dashed rounded-xl p-8 text-center transition-colors duration-200 cursor-pointer ${
                                        isDragging ? 'border-indigo-500 bg-indigo-50' : 'border-slate-300 hover:border-indigo-400 hover:bg-slate-50'
                                    }`}
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={handleDrop}
                                    onClick={() => fileInputRef.current?.click()}
                                >
                                    <input 
                                        type="file" 
                                        ref={fileInputRef} 
                                        onChange={handleFileChange} 
                                        accept="audio/*" 
                                        className="hidden" 
                                    />
                                    <div className="flex flex-col items-center justify-center space-y-3">
                                        {file ? (
                                            <>
                                                <MusicIcon />
                                                <p className="text-slate-700 font-medium">{file.name}</p>
                                                <p className="text-slate-400 text-sm">{(file.size / (1024 * 1024)).toFixed(2)} MB</p>
                                                <button 
                                                    onClick={(e) => { e.stopPropagation(); setFile(null); }}
                                                    className="text-xs text-red-500 hover:text-red-700 mt-2"
                                                >
                                                    ファイルをクリア
                                                </button>
                                            </>
                                        ) : (
                                            <>
                                                <UploadIcon />
                                                <p className="text-slate-600 font-medium">クリックまたはドラッグ＆ドロップ</p>
                                                <p className="text-slate-400 text-sm">MP3, WAV, FLAC等のオーディオファイル</p>
                                            </>
                                        )}
                                    </div>
                                </div>

                                {/* 処理方式の選択 */}
                                <div>
                                    <h3 className="text-sm font-semibold text-slate-700 mb-3">処理方式を選択</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <label className={`relative flex flex-col p-4 cursor-pointer rounded-lg border-2 transition-all duration-200 ${
                                            method === 'ai' ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200 hover:border-indigo-200'
                                        }`}>
                                            <div className="flex items-center mb-1">
                                                <input 
                                                    type="radio" 
                                                    name="method" 
                                                    value="ai" 
                                                    checked={method === 'ai'} 
                                                    onChange={() => setMethod('ai')} 
                                                    className="h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" 
                                                />
                                                <span className="ml-2 font-medium text-slate-900">AI分離 (Demucs)</span>
                                            </div>
                                            <p className="text-xs text-slate-500 ml-6">最新の分離AI(Demucs)を使用し、ボーカルと伴奏を高品質に分離します。初回はモデルDLのため時間がかかります。</p>
                                        </label>

                                        <label className={`relative flex flex-col p-4 cursor-pointer rounded-lg border-2 transition-all duration-200 ${
                                            method === 'phase' ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200 hover:border-indigo-200'
                                        }`}>
                                            <div className="flex items-center mb-1">
                                                <input 
                                                    type="radio" 
                                                    name="method" 
                                                    value="phase" 
                                                    checked={method === 'phase'} 
                                                    onChange={() => setMethod('phase')} 
                                                    className="h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" 
                                                />
                                                <span className="ml-2 font-medium text-slate-900">位相キャンセル</span>
                                            </div>
                                            <p className="text-xs text-slate-500 ml-6">中央の音を打ち消す古典的な手法。高速ですが、ベース等も消える可能性があります。</p>
                                        </label>
                                    </div>
                                </div>

                                {/* 実行ボタン */}
                                <button 
                                    onClick={handleStartProcessing}
                                    disabled={!file}
                                    className={`w-full py-3 px-4 rounded-lg text-white font-medium transition-colors ${
                                        file ? 'bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg' : 'bg-slate-300 cursor-not-allowed'
                                    }`}
                                >
                                    ボーカルを除去する
                                </button>
                                <p className="text-xs text-center text-slate-400 mt-2">※これはUIのモックアップです。実際にはPythonバックエンドと通信します。</p>
                            </div>
                        )}

                        {status === 'processing' && (
                            <div className="flex flex-col items-center justify-center py-12">
                                <SpinnerIcon />
                                <h3 className="mt-4 text-lg font-medium text-slate-900">処理中...</h3>
                                <p className="text-sm text-slate-500 mb-6">
                                    {method === 'ai' ? 'AIモデル(Spleeter)で音源を解析しています' : '位相キャンセル処理を適用しています'}
                                </p>
                                
                                <div className="w-full bg-slate-200 rounded-full h-2.5 mb-2">
                                    <div 
                                        className="bg-indigo-600 h-2.5 rounded-full transition-all duration-300 ease-out" 
                                        style={{ width: `${progress}%` }}
                                    ></div>
                                </div>
                                <p className="text-xs text-slate-500 font-medium">{Math.round(progress)}%</p>
                            </div>
                        )}

                        {status === 'completed' && (
                            <div className="flex flex-col items-center justify-center py-8 text-center">
                                <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                                    <svg className="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                                <h3 className="text-xl font-bold text-slate-900 mb-2">処理が完了しました！</h3>
                                <p className="text-slate-500 mb-8">分離されたファイルをダウンロードできます。</p>
                                
                                <div className="w-full space-y-3">
                                    {downloadLinks?.instrumental && (
                                        <a 
                                            href={downloadLinks.instrumental} 
                                            download 
                                            className="w-full flex items-center justify-center py-3 px-4 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 rounded-lg font-medium transition-colors border border-indigo-200"
                                        >
                                            <DownloadIcon />
                                            インストゥルメンタル (伴奏) を保存
                                        </a>
                                    )}
                                    
                                    {method === 'ai' && downloadLinks?.vocals && (
                                        <a 
                                            href={downloadLinks.vocals} 
                                            download 
                                            className="w-full flex items-center justify-center py-3 px-4 bg-slate-50 text-slate-700 hover:bg-slate-100 rounded-lg font-medium transition-colors border border-slate-200"
                                        >
                                            <DownloadIcon />
                                            抽出されたボーカルのみを保存
                                        </a>
                                    )}
                                </div>

                                <button 
                                    onClick={handleReset}
                                    className="mt-8 text-sm text-indigo-600 hover:text-indigo-800 font-medium"
                                >
                                    別のファイルを処理する
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
