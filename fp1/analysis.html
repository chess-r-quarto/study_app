    const DISTRIBUTION_DATA = [

      { name: '中堅地銀/信金', ratio: 3.2, avg: 5.4, label: '標準層' },
      { name: '証券/WM部門', ratio: 8.5, avg: 5.4, label: '高度コンサル層' },
      { name: '生保/FP部門', ratio: 4.8, avg: 5.4, label: '専門特化層' },
      { name: '一般事業/独立/その他', ratio: 1.5, avg: 5.4, label: '周辺層' },
    ];

    const formatNum = (v: number) => v.toLocaleString();

            </p>
          </header>

          {/* 保持率比較グラフ */}

              <div>
                <h3 className="text-xl font-black text-slate-800 flex items-center gap-2">
                  <span className="w-2 h-6 bg-blue-600 rounded-full"></span>
                  業態・部門別 1級保持率の推計

              </div>
              <div className="text-right">
                <p className="text-[10px] font-black text-slate-400 uppercase">Industry Average</p>

              </div>
            </div>

            <div className="h-[400px] w-full">
              <ResponsiveContainer>
                <BarChart data={DISTRIBUTION_DATA} margin={{top: 20, right: 30, left: 0, bottom: 60}}>

                    {DISTRIBUTION_DATA.map((entry, index) => (
                      <Cell key={`cell-${index}`} fill={entry.ratio > 5.4 ? '#2563eb' : '#94a3b8'} />
                    ))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

                </li>
              </ul>
            </div>

            {/* 資格ピラミッド */}
            <div className="bg-slate-900 p-8 rounded-[2rem] text-white">
              <h3 className="text-lg font-black mb-6">資格の希少性ピラミッド</h3>
              <div className="space-y-4">

                  <div className="flex justify-between items-center mb-1">
                    <span className="text-xs font-bold text-blue-400">1級技能士</span>
                    <span className="text-lg font-black">約 5.9 万人</span>

              </p>
              <ul className="list-disc list-inside space-y-1">
                <li>「1級保持率 5〜6%」という数値は、累計取得者数(約6万人)を業界従事者(約110万人)で除した概数に基づくシミュレーションです。</li>
                <li>業態別の保持率は、一般的な人材育成傾向と公開されている一部の組織データを参考にAIがモデル化した推測値です。</li>
                <li>「累計取得者数」は試験実施機関（きんざい・日本FP協会）の公開データを名寄せし、重複を排除した独自モデルにより算出しています。</li>
                <li>実際の組織における保持率は、経営戦略や部署、地域により大きく異なる場合があります。</li>
              </ul>
              <p className="mt-4 border-t border-slate-700 pt-4 text-center text-[10px] text-slate-500">
                © 2025 AI-Generated Financial Industry Analytics (Unofficial)

            </div>
